name: Cleanup Tasks

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY RUN（true=確認のみ／false=Notionへ反映）'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: タスク一括クリーンアップ
        run: node scripts/cleanup-tasks.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DRY_RUN:      ${{ inputs.dry_run }}
